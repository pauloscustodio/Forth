name: Cross-Platform CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, msys2]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2 (only for msys2)
      if: matrix.os == 'msys2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: git mingw-w64-ucrt-x86_64-gcc

    - name: Run tests
      shell: bash
      run: |
        echo "Running tests on ${{ matrix.os }}"
        make test
